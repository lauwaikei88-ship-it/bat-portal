<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes AI - Image to GIF Pipeline</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agnes AI <span>GIF Creator</span></h1>
            <p>Upload a pixel art image and describe how it should move.</p>
        </header>

        <main>
            <div class="input-section">
                <!-- Image Upload -->
                <div class="upload-container">
                    <label for="image-upload" class="upload-label">
                        <span id="upload-text">Drop an image here or click to upload</span>
                        <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" class="hidden-input">
                    </label>
                    <div id="image-preview" class="hidden"></div>
                </div>

                <!-- Motion Prompt -->
                <textarea id="prompt" placeholder="e.g. The clouds are drifting slowly from left to right, the red lanterns are swaying gently in the breeze..."></textarea>
                <div class="actions">
                    <button id="btn-video" class="btn primary">Generate GIF Animation</button>
                </div>
            </div>

            <div class="results-section">
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p id="loading-text">Generating your masterpiece...</p>
                </div>
                
                <div id="error" class="hidden"></div>
                
                <div id="result-container" class="hidden">
                    <!-- Image or Video will be injected here -->
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
